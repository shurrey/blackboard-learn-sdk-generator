sdk:
  name: blackboard-lms
  version: "1.0.0"
  license: Apache-2.0

api:
  baseUrl: "https://{domain}/learn/api/public"
  specUrl: "https://developer.blackboard.com/portal/docs/apis/learn-swagger.json"

resources:
  courses:
    methods:
      list: { operationId: "GetCourses" }
      get: { operationId: "GetCourse" }
      create: { operationId: "CreateCourse" }
      update: { operationId: "UpdateCourse" }
      delete: { operationId: "DeleteCourse" }
    subresources:
      contents:
        methods:
          list: { operationId: "GetContents" }
          get: { operationId: "GetContent" }
          create: { operationId: "CreateContent" }
          update: { operationId: "UpdateContent" }
          delete: { operationId: "DeleteContent" }
        subresources:
          children:
            methods:
              list: { operationId: "GetContentChildren" }
          attachments:
            methods:
              list: { operationId: "GetContentAttachments" }
              get: { operationId: "GetContentAttachment" }
              create: { operationId: "CreateContentAttachment" }
              delete: { operationId: "DeleteContentAttachment" }
      memberships:
        displayName: "Enrollments"
        methods:
          list: { operationId: "GetCourseMemberships" }
          get: { operationId: "GetCourseMembership" }
          create: { operationId: "CreateCourseMembership" }
          update: { operationId: "UpdateCourseMembership" }
          delete: { operationId: "DeleteCourseMembership" }
      gradebook:
        subresources:
          columns:
            methods:
              list: { operationId: "GetGradebookColumns" }
              get: { operationId: "GetGradebookColumn" }
              create: { operationId: "CreateGradebookColumn" }
              update: { operationId: "UpdateGradebookColumn" }
              delete: { operationId: "DeleteGradebookColumn" }
            subresources:
              attempts:
                methods:
                  list: { operationId: "GetColumnAttempts" }
                  get: { operationId: "GetColumnAttempt" }
          schemas:
            methods:
              list: { operationId: "GetGradebookSchemas" }
              get: { operationId: "GetGradebookSchema" }
      groups:
        methods:
          list: { operationId: "GetCourseGroups" }
          get: { operationId: "GetCourseGroup" }
          create: { operationId: "CreateCourseGroup" }
          update: { operationId: "UpdateCourseGroup" }
          delete: { operationId: "DeleteCourseGroup" }
        subresources:
          users:
            methods:
              list: { operationId: "GetCourseGroupUsers" }
              get: { operationId: "GetCourseGroupUser" }
              create: { operationId: "CreateCourseGroupUser" }
              delete: { operationId: "DeleteCourseGroupUser" }
      messages:
        methods:
          list: { operationId: "GetCourseMessages" }
          get: { operationId: "GetCourseMessage" }
          create: { operationId: "CreateCourseMessage" }
      announcements:
        methods:
          list: { operationId: "GetCourseAnnouncements" }
          get: { operationId: "GetCourseAnnouncement" }
          create: { operationId: "CreateCourseAnnouncement" }
          update: { operationId: "UpdateCourseAnnouncement" }
          delete: { operationId: "DeleteCourseAnnouncement" }
  users:
    methods:
      list: { operationId: "GetUsers" }
      get: { operationId: "GetUser" }
      create: { operationId: "CreateUser" }
      update: { operationId: "UpdateUser" }
      delete: { operationId: "DeleteUser" }
    subresources:
      sessions:
        methods:
          list: { operationId: "GetUserSessions" }
          get: { operationId: "GetUserSession" }
          delete: { operationId: "DeleteUserSession" }
      observees:
        methods:
          list: { operationId: "GetUserObservees" }
          get: { operationId: "GetUserObservee" }
          create: { operationId: "CreateUserObservee" }
          delete: { operationId: "DeleteUserObservee" }
  announcements:
    methods:
      list: { operationId: "GetSystemAnnouncements" }
      get: { operationId: "GetSystemAnnouncement" }
      create: { operationId: "CreateSystemAnnouncement" }
      update: { operationId: "UpdateSystemAnnouncement" }
      delete: { operationId: "DeleteSystemAnnouncement" }
  calendars:
    subresources:
      items:
        methods:
          list: { operationId: "GetCalendarItems" }
          get: { operationId: "GetCalendarItem" }
          create: { operationId: "CreateCalendarItem" }
          update: { operationId: "UpdateCalendarItem" }
          delete: { operationId: "DeleteCalendarItem" }
  dataSources:
    methods:
      list: { operationId: "GetDataSources" }
      get: { operationId: "GetDataSource" }
      create: { operationId: "CreateDataSource" }
      update: { operationId: "UpdateDataSource" }
      delete: { operationId: "DeleteDataSource" }
  terms:
    methods:
      list: { operationId: "GetTerms" }
      get: { operationId: "GetTerm" }
      create: { operationId: "CreateTerm" }
      update: { operationId: "UpdateTerm" }
      delete: { operationId: "DeleteTerm" }
  roles:
    methods:
      list: { operationId: "GetInstitutionRoles" }
      get: { operationId: "GetInstitutionRole" }
  lti:
    subresources:
      placements:
        methods:
          list: { operationId: "GetLtiPlacements" }
          get: { operationId: "GetLtiPlacement" }
          create: { operationId: "CreateLtiPlacement" }
          update: { operationId: "UpdateLtiPlacement" }
          delete: { operationId: "DeleteLtiPlacement" }
  institutionHierarchy:
    subresources:
      nodes:
        methods:
          list: { operationId: "GetInstitutionHierarchyNodes" }
          get: { operationId: "GetInstitutionHierarchyNode" }
          create: { operationId: "CreateInstitutionHierarchyNode" }
          update: { operationId: "UpdateInstitutionHierarchyNode" }
          delete: { operationId: "DeleteInstitutionHierarchyNode" }

pagination:
  style: offset
  offsetParam: offset
  limitParam: limit
  defaultLimit: 100
  resultsField: results
  pagingField: paging
  nextPageField: paging.nextPage

auth:
  twoLegged:
    tokenEndpoint: /learn/api/public/v1/oauth2/token
    grantType: client_credentials
  threeLegged:
    authorizeEndpoint: /learn/api/public/v1/oauth2/authorizationcode
    tokenEndpoint: /learn/api/public/v1/oauth2/token
    grantType: authorization_code
    pkce: true

idFormats:
  formats:
    - "primary ID"
    - "externalId:{id}"
    - "userName:{name}"
    - "uuid:{uuid}"
  description: >
    Blackboard LMS supports multiple ID formats. Primary keys are numeric.
    Alternative lookups use prefixed formats: externalId:{id}, userName:{name}, uuid:{uuid}.

naming:
  collisions:
    - canonical: announcements
      contexts:
        system: announcements
        course: announcements  # Resolved by hierarchy: client.courses.announcements
    - canonical: roles
      contexts:
        institution: roles
        course: course_roles
        system: system_roles

languages:
  python:
    packageName: blackboard-lms
    moduleName: blackboard_lms
    minVersion: "3.12"
    httpClient: httpx
    models: pydantic
    formatter: ruff
  typescript:
    packageName: "@blackboard/lms-sdk"
    minVersion: "node22"
    httpClient: fetch
    formatter: prettier
    validation: true
  java:
    groupId: com.blackboard
    artifactId: lms-sdk
    minVersion: "21"
    httpClient: java.net.http
    models: jackson
    formatter: google-java-format
    validation: true
  csharp:
    namespace: Blackboard.LMS
    packageName: Blackboard.LMS
    minVersion: "net9.0"
    httpClient: HttpClient
    models: System.Text.Json
    formatter: dotnet-format
    validation: true
  go:
    module: "github.com/blackboard/lms-go"
    minVersion: "1.24"
    httpClient: net/http
    formatter: gofmt
    validation: true
  ruby:
    gemName: blackboard_lms
    moduleName: BlackboardLMS
    minVersion: "3.4"
    httpClient: faraday
    formatter: rubocop

cli:
  module: "github.com/blackboard/bblms-cli"
  sdkModule: "github.com/blackboard/lms-go"
  binaryName: bblms
  minGoVersion: "1.24"
  formatter: gofmt

mcp:
  baseSdk: python
  serverName: blackboard-lms-mcp
  transport:
    - stdio
    - streamable-http
