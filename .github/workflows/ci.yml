name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    name: Build & Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22, 24]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

  regenerate:
    name: Regenerate SDKs
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache spec
        uses: actions/cache@v4
        with:
          path: spec/cache/
          key: spec-cache-${{ hashFiles('generator.config.yaml') }}
          restore-keys: |
            spec-cache-

      - name: Regenerate all targets
        run: npm run generate -- all --skip-download

      - name: Verify output directories exist
        run: |
          for dir in blackboard-lms-typescript blackboard-lms-python blackboard-lms-java blackboard-lms-csharp blackboard-lms-go blackboard-lms-ruby blackboard-lms-mcp blackboard-lms-cli; do
            if [ ! -d "output/$dir" ]; then
              echo "Missing output directory: output/$dir"
              exit 1
            fi
            echo "OK: output/$dir"
          done

  test-typescript-sdk:
    name: Test TypeScript SDK
    runs-on: ubuntu-latest
    needs: regenerate
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install generator dependencies
        run: npm ci

      - name: Cache spec
        uses: actions/cache@v4
        with:
          path: spec/cache/
          key: spec-cache-${{ hashFiles('generator.config.yaml') }}
          restore-keys: |
            spec-cache-

      - name: Regenerate TypeScript SDK
        run: npm run generate -- typescript --skip-download

      - name: Install SDK dependencies
        working-directory: output/blackboard-lms-typescript
        run: npm install

      - name: Start Prism mock server
        run: |
          npx @stoplight/prism-cli mock spec/cache/openapi3.json --port 4010 --host 127.0.0.1 --dynamic &
          sleep 3
          curl -sf http://127.0.0.1:4010 || echo "Prism started (may return non-200 on root)"

      - name: Run SDK tests
        working-directory: output/blackboard-lms-typescript
        run: npx vitest run

  test-python-sdk:
    name: Test Python SDK
    runs-on: ubuntu-latest
    needs: regenerate
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install generator dependencies
        run: npm ci

      - name: Cache spec
        uses: actions/cache@v4
        with:
          path: spec/cache/
          key: spec-cache-${{ hashFiles('generator.config.yaml') }}
          restore-keys: |
            spec-cache-

      - name: Regenerate Python SDK
        run: npm run generate -- python --skip-download

      - name: Install SDK dependencies
        working-directory: output/blackboard-lms-python
        run: pip install -e ".[dev]"

      - name: Start Prism mock server
        run: |
          npx @stoplight/prism-cli mock spec/cache/openapi3.json --port 4010 --host 127.0.0.1 --dynamic &
          sleep 3

      - name: Run SDK tests
        working-directory: output/blackboard-lms-python
        run: pytest tests/ -v

  test-java-sdk:
    name: Test Java SDK
    runs-on: ubuntu-latest
    needs: regenerate
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install generator dependencies
        run: npm ci

      - name: Cache spec
        uses: actions/cache@v4
        with:
          path: spec/cache/
          key: spec-cache-${{ hashFiles('generator.config.yaml') }}
          restore-keys: |
            spec-cache-

      - name: Regenerate Java SDK
        run: npm run generate -- java --skip-download

      - name: Start Prism mock server
        run: |
          npx @stoplight/prism-cli mock spec/cache/openapi3.json --port 4010 --host 127.0.0.1 --dynamic &
          sleep 3

      - name: Run SDK tests
        working-directory: output/blackboard-lms-java
        run: mvn test

  test-csharp-sdk:
    name: Test C# SDK
    runs-on: ubuntu-latest
    needs: regenerate
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Install generator dependencies
        run: npm ci

      - name: Cache spec
        uses: actions/cache@v4
        with:
          path: spec/cache/
          key: spec-cache-${{ hashFiles('generator.config.yaml') }}
          restore-keys: |
            spec-cache-

      - name: Regenerate C# SDK
        run: npm run generate -- csharp --skip-download

      - name: Run SDK tests
        working-directory: output/blackboard-lms-csharp
        run: dotnet test

  test-go-sdk:
    name: Test Go SDK
    runs-on: ubuntu-latest
    needs: regenerate
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: false

      - name: Install generator dependencies
        run: npm ci

      - name: Cache spec
        uses: actions/cache@v4
        with:
          path: spec/cache/
          key: spec-cache-${{ hashFiles('generator.config.yaml') }}
          restore-keys: |
            spec-cache-

      - name: Regenerate Go SDK
        run: npm run generate -- go --skip-download

      - name: Start Prism mock server
        run: |
          npx @stoplight/prism-cli mock spec/cache/openapi3.json --port 4010 --host 127.0.0.1 --dynamic &
          sleep 3

      - name: Run SDK tests
        working-directory: output/blackboard-lms-go
        run: go test ./... -v

  test-ruby-sdk:
    name: Test Ruby SDK
    runs-on: ubuntu-latest
    needs: regenerate
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"

      - name: Install generator dependencies
        run: npm ci

      - name: Cache spec
        uses: actions/cache@v4
        with:
          path: spec/cache/
          key: spec-cache-${{ hashFiles('generator.config.yaml') }}
          restore-keys: |
            spec-cache-

      - name: Regenerate Ruby SDK
        run: npm run generate -- ruby --skip-download

      - name: Install SDK dependencies
        working-directory: output/blackboard-lms-ruby
        run: bundle install

      - name: Start Prism mock server
        run: |
          npx @stoplight/prism-cli mock spec/cache/openapi3.json --port 4010 --host 127.0.0.1 --dynamic &
          sleep 3

      - name: Run SDK tests
        working-directory: output/blackboard-lms-ruby
        run: bundle exec rspec

  test-mcp-sdk:
    name: Test MCP SDK
    runs-on: ubuntu-latest
    needs: regenerate
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install generator dependencies
        run: npm ci

      - name: Cache spec
        uses: actions/cache@v4
        with:
          path: spec/cache/
          key: spec-cache-${{ hashFiles('generator.config.yaml') }}
          restore-keys: |
            spec-cache-

      - name: Regenerate MCP SDK
        run: npm run generate -- mcp --skip-download

      - name: Install SDK dependencies
        working-directory: output/blackboard-lms-mcp
        run: pip install -e ".[dev]"

      - name: Run SDK tests
        working-directory: output/blackboard-lms-mcp
        run: pytest tests/ -v

  test-cli:
    name: Test CLI
    runs-on: ubuntu-latest
    needs: regenerate
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: false

      - name: Install generator dependencies
        run: npm ci

      - name: Cache spec
        uses: actions/cache@v4
        with:
          path: spec/cache/
          key: spec-cache-${{ hashFiles('generator.config.yaml') }}
          restore-keys: |
            spec-cache-

      - name: Regenerate Go SDK and CLI
        run: |
          npm run generate -- go --skip-download
          npm run generate -- cli --skip-download

      - name: Add local replace for Go SDK
        working-directory: output/blackboard-lms-cli
        run: |
          go mod edit -replace github.com/blackboard/lms-go=../blackboard-lms-go
          go mod tidy

      - name: Build CLI
        working-directory: output/blackboard-lms-cli
        run: go build ./...
