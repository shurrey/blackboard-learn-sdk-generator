name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

  regenerate:
    name: Regenerate SDKs
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache spec
        uses: actions/cache@v4
        with:
          path: spec/cache/
          key: spec-cache-${{ hashFiles('generator.config.yaml') }}
          restore-keys: |
            spec-cache-

      - name: Regenerate all targets
        run: npm run generate -- all --skip-download

      - name: Verify output directories exist
        run: |
          for dir in blackboard-lms-typescript blackboard-lms-python blackboard-lms-java blackboard-lms-csharp blackboard-lms-go blackboard-lms-ruby blackboard-lms-mcp; do
            if [ ! -d "output/$dir" ]; then
              echo "Missing output directory: output/$dir"
              exit 1
            fi
            echo "OK: output/$dir"
          done

  test-typescript-sdk:
    name: Test TypeScript SDK
    runs-on: ubuntu-latest
    needs: regenerate
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install generator dependencies
        run: npm ci

      - name: Cache spec
        uses: actions/cache@v4
        with:
          path: spec/cache/
          key: spec-cache-${{ hashFiles('generator.config.yaml') }}
          restore-keys: |
            spec-cache-

      - name: Regenerate TypeScript SDK
        run: npm run generate -- typescript --skip-download

      - name: Install SDK dependencies
        working-directory: output/blackboard-lms-typescript
        run: npm install

      - name: Run SDK tests
        working-directory: output/blackboard-lms-typescript
        run: npx vitest run

  test-python-sdk:
    name: Test Python SDK
    runs-on: ubuntu-latest
    needs: regenerate
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install generator dependencies
        run: npm ci

      - name: Cache spec
        uses: actions/cache@v4
        with:
          path: spec/cache/
          key: spec-cache-${{ hashFiles('generator.config.yaml') }}
          restore-keys: |
            spec-cache-

      - name: Regenerate Python SDK
        run: npm run generate -- python --skip-download

      - name: Install SDK dependencies
        working-directory: output/blackboard-lms-python
        run: pip install -e ".[dev]"

      - name: Run SDK tests
        working-directory: output/blackboard-lms-python
        run: pytest tests/ -v
